name: assignment-test

on:
  push:
    tags-ignore:
      - '*'
    branches:
      - '*'

jobs:
  unit-test:
    container: cuaesd/aesd-autotest:24-unit-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone assignment-autotest
        run: |
          rm -rf assignment-autotest
          git clone https://github.com/cu-ecen-aeld/assignment-autotest.git
          cd assignment-autotest
          git submodule update --init --recursive
      - name: Run unit test
        run: ./unit-test.sh

  full-test:
    container: cuaesd/aesd-autotest:24-assignment5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install netcat
        run: |
          apt-get update
          apt-get install -y netcat
      - name: Clone assignment-autotest
        run: |
          rm -rf assignment-autotest
          git clone https://github.com/cu-ecen-aeld/assignment-autotest.git
      - name: Run full test
        run: ./full-test.sh
